<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - Shri Satguru Motors</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .search-box input {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            width: 300px;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-box button {
            padding: 12px 30px;
            background: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.05);
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .city-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .coordinates {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 20px;
        }

        .current-weather {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .temp-display {
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .temperature {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
        }

        .weather-icon {
            font-size: 4em;
            color: #ffb347;
        }

        .weather-description {
            font-size: 1.2em;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .detail-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
        }

        .detail-label {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .forecast {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .forecast h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .forecast-item {
            text-align: center;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
        }

        .forecast-day {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 2em;
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 1.2em;
            color: #667eea;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .search-box input {
                width: 200px;
            }

            .weather-grid {
                grid-template-columns: 1fr;
            }

            .forecast-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Real-time weather information for Shri Satguru Motors</p>
        </div>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." value="Chandigarh">
            <button onclick="searchWeather()">Search</button>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div id="weatherContainer" class="weather-grid"></div>
        <div id="forecastContainer" class="forecast"></div>
    </div>

    <script>
        const API_KEY = 'e0f80ef1b97f3ad7f2e2a90d6e2b8c3f'; // Free weather API key
        const BASE_URL = 'https://api.open-meteo.com/v1/forecast';

        function getWeatherIcon(code, isDay) {
            // WMO Weather interpretation codes
            if (code === 0 || code === 1) return isDay ? '☀️' : '🌙';
            if (code === 2) return '⛅';
            if (code === 3) return '☁️';
            if (code === 45 || code === 48) return '🌫️';
            if (code === 51 || code === 53 || code === 55) return '🌧️';
            if (code === 61 || code === 63 || code === 65) return '🌧️';
            if (code === 80 || code === 81 || code === 82) return '🌧️';
            if (code === 71 || code === 73 || code === 75 || code === 77 || code === 85 || code === 86) return '❄️';
            if (code === 80 || code === 81 || code === 82) return '🌧️';
            if (code === 95 || code === 96 || code === 99) return '⛈️';
            return '🌤️';
        }

        function getWeatherDescription(code) {
            const descriptions = {
                0: 'Clear sky',
                1: 'Mainly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Foggy',
                48: 'Foggy',
                51: 'Light drizzle',
                53: 'Moderate drizzle',
                55: 'Dense drizzle',
                61: 'Slight rain',
                63: 'Moderate rain',
                65: 'Heavy rain',
                71: 'Slight snow',
                73: 'Moderate snow',
                75: 'Heavy snow',
                77: 'Snow grains',
                80: 'Slight rain showers',
                81: 'Moderate rain showers',
                82: 'Violent rain showers',
                85: 'Slight snow showers',
                86: 'Heavy snow showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm with slight hail',
                99: 'Thunderstorm with heavy hail'
            };
            return descriptions[code] || 'Unknown';
        }

        async function getCoordinates(city) {
            try {
                const response = await fetch(
                    `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=en&format=json`
                );
                const data = await response.json();
                
                if (!data.results || data.results.length === 0) {
                    throw new Error('City not found');
                }
                
                return data.results[0];
            } catch (error) {
                throw new Error('Failed to find city coordinates');
            }
        }

        async function fetchWeather(city) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.remove('show');
            
            try {
                // Get coordinates for the city
                const coords = await getCoordinates(city);
                const { latitude, longitude, name, country } = coords;

                // Fetch weather data
                const response = await fetch(
                    `${BASE_URL}?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,is_day,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`
                );
                
                if (!response.ok) throw new Error('Failed to fetch weather data');
                
                const weatherData = await response.json();
                displayWeather(weatherData, name, country, latitude, longitude);
                
            } catch (error) {
                showError(error.message);
            }
        }

        function displayWeather(data, cityName, country, lat, lon) {
            const container = document.getElementById('weatherContainer');
            const current = data.current;
            const daily = data.daily;
            
            const weatherIcon = getWeatherIcon(current.weather_code, current.is_day);
            const description = getWeatherDescription(current.weather_code);

            const weatherCard = `
                <div class="weather-card">
                    <div class="city-name">${cityName}, ${country}</div>
                    <div class="coordinates">📍 ${lat.toFixed(2)}° N, ${lon.toFixed(2)}° E</div>
                    
                    <div class="current-weather">
                        <div>
                            <div class="temp-display">
                                <span class="temperature">${Math.round(current.temperature_2m)}°C</span>
                            </div>
                            <div class="weather-description">${description}</div>
                            <div style="font-size: 0.95em; color: #666;">
                                Feels like: <strong>${Math.round(current.apparent_temperature)}°C</strong>
                            </div>
                        </div>
                        <div class="weather-icon">${weatherIcon}</div>
                    </div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">💧 Humidity</div>
                            <div class="detail-value">${current.relative_humidity_2m}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">💨 Wind Speed</div>
                            <div class="detail-value">${current.wind_speed_10m} km/h</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">🌡️ Max Temp</div>
                            <div class="detail-value">${Math.round(daily.temperature_2m_max[0])}°C</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">❄️ Min Temp</div>
                            <div class="detail-value">${Math.round(daily.temperature_2m_min[0])}°C</div>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = weatherCard;
            displayForecast(daily);
        }

        function displayForecast(daily) {
            const container = document.getElementById('forecastContainer');
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            
            let forecastHTML = '<h2>📅 7-Day Forecast</h2><div class="forecast-grid">';
            
            for (let i = 0; i < 7; i++) {
                const date = new Date(daily.time[i]);
                const day = days[date.getDay()];
                const icon = getWeatherIcon(daily.weather_code[i], true);
                const maxTemp = Math.round(daily.temperature_2m_max[i]);
                const minTemp = Math.round(daily.temperature_2m_min[i]);
                
                forecastHTML += `
                    <div class="forecast-item">
                        <div class="forecast-day">${day}</div>
                        <div>${date.getDate()}/${date.getMonth() + 1}</div>
                        <div class="forecast-icon">${icon}</div>
                        <div class="forecast-temp">${maxTemp}° / ${minTemp}°</div>
                    </div>
                `;
            }
            
            forecastHTML += '</div>';
            container.innerHTML = forecastHTML;
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('show');
        }

        function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (city) {
                fetchWeather(city);
            }
        }

        // Allow Enter key to search
        document.getElementById('cityInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // Load weather on page load
        window.addEventListener('load', function() {
            fetchWeather('Chandigarh');
        });

        // Get user's location weather
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const { latitude, longitude } = position.coords;
                    fetch(`https://geocoding-api.open-meteo.com/v1/search?latitude=${latitude}&longitude=${longitude}&count=1`)
                        .then(r => r.json())
                        .then(data => {
                            if (data.results && data.results.length > 0) {
                                fetchWeather(data.results[0].name);
                            }
                        })
                        .catch(() => fetchWeather('Chandigarh'));
                },
                () => fetchWeather('Chandigarh')
            );
        }
    </script>
</body>
</html>
